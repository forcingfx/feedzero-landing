<!DOCTYPE html>
<!-- Generated by build.mjs from a migration markdown file in the feedzero repo (docs/marketing/). Do not edit this file directly; edit the source in feedzero and run `node build.mjs`. -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <meta name="description" content="{{description}}">
    <link rel="canonical" href="{{intendedUrl}}">
    <meta name="robots" content="index, follow">

    <meta property="og:title" content="{{title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{intendedUrl}}">
    <meta property="og:site_name" content="FeedZero">
    <meta property="og:locale" content="en_US">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{title}}">
    <meta name="twitter:description" content="{{description}}">

    <meta name="theme-color" content="#ffffff">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; font-size: 17px; line-height: 1.65; color: #111; background: #fff; max-width: 38rem; margin: 3rem auto 4rem; padding: 0 1.25rem; }
        h1 { font-size: 1.85rem; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 0.6rem; }
        h2 { font-size: 1.15rem; font-weight: 700; margin: 1.9rem 0 0.55rem; letter-spacing: -0.005em; }
        h3 { font-size: 1rem; font-weight: 600; margin: 1.25rem 0 0.3rem; }
        p, ul, ol { margin: 0 0 0.95rem; }
        ul, ol { padding-left: 1.4rem; }
        li { margin-bottom: 0.35rem; }
        a { color: #0645ad; }
        a:visited { color: #0b0080; }
        a:hover { color: #06c; }
        .nav { color: #555; font-size: 0.95rem; margin-bottom: 1.5rem; }
        hr { border: 0; border-top: 1px solid #ddd; margin: 2.5rem 0 1.25rem; }
        footer { font-size: 0.9rem; color: #555; }
        code { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 0.9em; background: #f4f4f4; padding: 0.05em 0.3em; border-radius: 3px; }
        strong { color: #0f172a; }
    </style>
</head>
<body>
    <header>
        <p class="nav"><a href="/">← Back to FeedZero</a></p>
    </header>

    <main>
{{body}}
    </main>

    <hr>
    <footer>
{{footer}}
    </footer>
</body>
</html>
